name: Publish RPM repository

on:
  repository_dispatch:
    types: [opentubex-release, opentubex-nightly]
  workflow_dispatch:
    inputs:
      releaseTag:
        description: Release tag to publish (for example, v0.29.0-beta)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: rpm-repository
  cancel-in-progress: false

jobs:
  build:
    name: Build signed repository
    runs-on: ubuntu-latest
    container: fedora:latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Install tools
        run: dnf --assumeyes install cpio createrepo_c gh git gnupg2 rpm-build rpm-sign

      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
        with:
          persist-credentials: false

      - name: Resolve releases
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.client_payload.tag || inputs.releaseTag }}
        run: |
          set -euo pipefail
          requested_tag="$INPUT_TAG"
          stable_tag=''
          nightly_tag=''

          if [[ "$requested_tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-beta$ ]]; then
            stable_tag="$requested_tag"
          elif [[ "$requested_tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+-nightly-[0-9]+)$ ]]; then
            nightly_tag="$requested_tag"
          elif [[ -n "$requested_tag" ]]; then
            echo "Expected a stable or nightly OpenTubeX tag, got: $requested_tag" >&2
            exit 1
          fi

          if [[ -z "$stable_tag" ]]; then
            stable_tag="$(gh release view --repo OpenTubeX/OpenTubeX --json tagName --jq .tagName)"
          fi
          if [[ ! "$stable_tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-beta$ ]]; then
            echo "Expected a stable tag, got: $stable_tag" >&2
            exit 1
          fi
          stable_version="${BASH_REMATCH[1]}"

          if [[ -z "$nightly_tag" ]]; then
            nightly_tag="$(gh release list --repo OpenTubeX/OpenTubeX --limit 100 \
              --json createdAt,isPrerelease,tagName \
              --jq '[.[] | select(.isPrerelease and (.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+-nightly-[0-9]+$")))] | sort_by(.createdAt) | reverse | .[0].tagName // ""')"
          fi

          nightly_version=''
          if [[ -n "$nightly_tag" ]]; then
            if [[ ! "$nightly_tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+-nightly-[0-9]+)$ ]]; then
              echo "Expected a nightly tag, got: $nightly_tag" >&2
              exit 1
            fi
            nightly_version="${BASH_REMATCH[1]}"
          fi

          {
            echo "stable_tag=$stable_tag"
            echo "stable_version=$stable_version"
            echo "nightly_tag=$nightly_tag"
            echo "nightly_version=$nightly_version"
          } >> "$GITHUB_OUTPUT"

      - name: Download RPM packages
        env:
          RELEASE_TAG: ${{ steps.release.outputs.stable_tag }}
          VERSION: ${{ steps.release.outputs.stable_version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir release-files
          gh release download "$RELEASE_TAG" \
            --repo OpenTubeX/OpenTubeX \
            --dir release-files \
            --pattern "opentubex-${VERSION}-beta.amd64.rpm" \
            --pattern "opentubex-${VERSION}-beta.arm64.rpm"

      - name: Download nightly RPM packages
        if: steps.release.outputs.nightly_tag != ''
        env:
          RELEASE_TAG: ${{ steps.release.outputs.nightly_tag }}
          VERSION: ${{ steps.release.outputs.nightly_version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir nightly-files
          gh release download "$RELEASE_TAG" \
            --repo OpenTubeX/OpenTubeX \
            --dir nightly-files \
            --pattern "opentubex-${VERSION}.amd64.rpm" \
            --pattern "opentubex-${VERSION}.arm64.rpm"

      - name: Import signing key
        id: signing-key
        env:
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
          RPM_GPG_PASSPHRASE: ${{ secrets.RPM_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$RPM_GPG_PRIVATE_KEY" ]]; then
            echo 'The RPM_GPG_PRIVATE_KEY secret is not configured.' >&2
            exit 1
          fi
          if [[ -z "$RPM_GPG_PASSPHRASE" ]]; then
            echo 'The RPM_GPG_PASSPHRASE secret is not configured.' >&2
            exit 1
          fi

          printf '%s\n' "$RPM_GPG_PRIVATE_KEY" | gpg --batch --import
          fingerprint="$(gpg --batch --with-colons --list-secret-keys | awk -F: '$1 == "fpr" { print $10; exit }')"

          if [[ -z "$fingerprint" ]]; then
            echo 'No private signing key was imported.' >&2
            exit 1
          fi

          passphrase_file="$RUNNER_TEMP/rpm-gpg-passphrase"
          printf '%s' "$RPM_GPG_PASSPHRASE" > "$passphrase_file"
          chmod 0600 "$passphrase_file"

          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"
          echo "passphrase-file=$passphrase_file" >> "$GITHUB_OUTPUT"

      - name: Build distribution packages
        env:
          STABLE_VERSION: ${{ steps.release.outputs.stable_version }}
          NIGHTLY_VERSION: ${{ steps.release.outputs.nightly_version }}
        run: |
          ./scripts/build-packages.sh release-files fedora-files "${STABLE_VERSION}-beta" fedora
          ./scripts/build-packages.sh release-files opensuse-files "${STABLE_VERSION}-beta" opensuse
          if [[ -n "$NIGHTLY_VERSION" ]]; then
            ./scripts/build-packages.sh nightly-files nightly-fedora-files "$NIGHTLY_VERSION" fedora
            ./scripts/build-packages.sh nightly-files nightly-opensuse-files "$NIGHTLY_VERSION" opensuse
          fi

      - name: Build signed repository
        env:
          RPM_GPG_KEY_ID: ${{ steps.signing-key.outputs.fingerprint }}
          RPM_GPG_PASSPHRASE_FILE: ${{ steps.signing-key.outputs.passphrase-file }}
        run: |
          ./scripts/build-repository.sh fedora-files repository opensuse-files \
            nightly-fedora-files nightly-opensuse-files

      - name: Upload repository
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: repository

  copr:
    name: Trigger COPR build
    if: github.event.action != 'opentubex-nightly'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Resolve release
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.client_payload.tag || inputs.releaseTag }}
        run: |
          set -euo pipefail
          tag="$INPUT_TAG"

          if [[ -z "$tag" ]]; then
            tag="$(gh release view --repo OpenTubeX/OpenTubeX --json tagName --jq .tagName)"
          fi

          if [[ ! "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-beta$ ]]; then
            echo "Expected a tag like v0.29.0-beta, got: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Trigger build
        env:
          COPR_WEBHOOK_URL: ${{ secrets.COPR_WEBHOOK_URL }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$COPR_WEBHOOK_URL" ]]; then
            echo 'The COPR_WEBHOOK_URL secret is not configured.' >&2
            exit 1
          fi

          wget --quiet --output-document=- \
            --timeout=30 --tries=3 \
            --post-data="$RELEASE_TAG" \
            "$COPR_WEBHOOK_URL"

  deploy:
    name: Publish stable repository
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      id-token: write
      pages: write

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Deploy repository
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
